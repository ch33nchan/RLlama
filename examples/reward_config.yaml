# examples/reward_config.yaml

# This block defines which reward components to load and their specific parameters.
reward_components:
  - name: LengthReward
    params:
      # We want to encourage responses around 50 characters.
      target_length: 50
      strength: 0.0005

  - name: HuggingFaceSentimentReward
    params:
      # Use a standard pre-trained sentiment model.
      model_path: "distilbert-base-uncased-finetuned-sst-2-english"

# This block defines how to combine the raw values from the components above.
# The weights determine the influence of each component on the final reward.
shaping_config:
  LengthReward:
    weight: 0.2
  HuggingFaceSentimentReward:
    weight: 0.8