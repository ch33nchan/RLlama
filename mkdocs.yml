site_name: RLlama Documentation
site_description: A composable reward engineering framework for reinforcement learning
site_author: ch33nchan
repo_url: https://github.com/ch33nchan/RLlama
theme:
  name: material
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - footnotes
  - attr_list
nav:
  - Home: index.md
  - Introduction:
    - Overview: introduction/overview.md
    - Features: introduction/features.md
  - Installation:
    - Requirements: installation/requirements.md
    - Methods: installation/methods.md
    - Configuration: installation/configuration.md
    - Verification: installation/verification.md
  - Getting Started:
    - Hello World: getting-started/hello-world.md
    - Basic Usage: getting-started/basic-usage.md
    - First Reward System: getting-started/first-reward-system.md
    - Common Patterns: getting-started/common-patterns.md
  - Examples:
    - Overview: examples/overview.md
    - CartPole: examples/cartpole.md
    - Mountain Car: examples/mountain-car.md
    - Lunar Lander: examples/lunar-lander.md
    - Maze Environment: examples/maze-environment.md
  - Concepts:
    - Reward Engineering: concepts/reward-engineering.md
  - Reward Engine:
    - Creating: reward-engine/creating.md
    - Adding Components: reward-engine/adding-components.md
    - Setting Weights: reward-engine/setting-weights.md
    - Computing Rewards: reward-engine/computing-rewards.md
    - Analyzing Contributions: reward-engine/analyzing-contributions.md
  - Cheatsheet: cheatsheet.md
  - Glossary: glossary.md
