site_name: RLlama Documentation
site_description: A composable reward engineering framework for reinforcement learning
site_url: https://ch33nchan.github.io/rllama/
repo_url: https://github.com/ch33nchan/rllama
repo_name: ch33nchan/rllama

theme:
  name: material
  palette:
    primary: indigo
    accent: deep orange
  logo: docs/images/llamagym.jpg
  favicon: docs/images/llamagym.jpg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Understanding RLlama:
    - Why RLlama?: why-rllama.md
    - Without RLlama: without-rllama.md
    - With RLlama: with-rllama.md
    - Core Concepts: concepts.md
  - Getting Started:
    - Installation: installation.md
    - Quickstart: quickstart.md
    - Basic Usage: usage.md
  - Guides:
    - Reward Component Design: component-design.md
    - Optimization Guide: optimization_guide.md
    - Reward Cookbook: cookbook.md
    - Integration with RL Frameworks: integration.md
  - API Reference:
    - Overview: api/overview.md
  - Examples:
    - Basic Examples: examples/basic.md
    - Advanced Examples: examples/advanced.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true

plugins:
  - search
